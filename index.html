<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ders Koçu | Premium AI Eğitim Başarı Platformu</title>
    <meta name="description" content="Ortaokul öğrencileri için yeni nesil yapay zeka destekli eğitim platformu.">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css?v=5">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <!-- Ionicons for modern scalable UI icons -->
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</head>
<body>

    <!-- APP CONTAINER (Handled by JS Router) -->
    <div id="app-root"></div>

    <script src="app.js?v=5"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').then(reg => {
                    console.log('SW Registered!', reg.scope);
                }).catch(err => console.log('SW Registration Failed!', err));
            });
        }
    </script>
</body>
</html>
